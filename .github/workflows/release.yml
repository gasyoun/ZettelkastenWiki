name: Release to PyPI

# Publishes on version tags via PyPI Trusted Publishing (OIDC) — no API token
# secret. One-time setup on pypi.org (owner): project "zettelkastenwiki" →
# Publishing → add GitHub publisher repo=gasyoun/ZettelkastenWiki,
# workflow=release.yml, environment=pypi. Until that exists, the publish job
# fails with "trusted publisher not configured" — everything else is ready.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install package and run tests first
        run: |
          pip install -e .[dev] build
          python -m pytest tests -q
      - name: Build sdist + wheel
        run: python -m build
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
